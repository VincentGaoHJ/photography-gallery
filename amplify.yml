version: 1
backend:
  phases:
    build:
      commands:
        - npm ci
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # expose backend config to the client (for /admin) + build
        - cp amplify_outputs.json public/amplify_outputs.json || true
        # derive the public media base (CloudFront domain + /media prefix) from the
        # backend outputs so the public site reads S3 manifests and resolves media URLs
        - export NEXT_PUBLIC_MEDIA_BASE_URL=$(node scripts/media-base.mjs)
        - echo "NEXT_PUBLIC_MEDIA_BASE_URL=$NEXT_PUBLIC_MEDIA_BASE_URL"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*